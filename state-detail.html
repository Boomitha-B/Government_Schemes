        const urlParams = new URLSearchParams(window.location.search);
        const stateKey = urlParams.get('state');
        const stateInfo = stateData[stateKey] || { name: "State Schemes", schemes: [] };

        document.getElementById('stateTitle').textContent = `Government Schemes - ${stateInfo.name}`;
        const container = document.getElementById('stateSchemesContainer');

        if (stateInfo.schemes.length === 0) {
            container.innerHTML = '<p class="text-center">Scheme information for this state is being updated. Please check back soon.</p>';
        } else {
            stateInfo.schemes.forEach(s => {
                const card = document.createElement('article');
                card.className = 'scheme-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="category-tag">${s.cat}</span>
                        <h3>${s.name}</h3>
                    </div>
                    <ul class="quick-eligibility">
                        <li><strong>Benefit:</strong> ${s.benefit}</li>
                    </ul>
                    <div class="card-footer">
                        <a href="${s.url}" class="btn btn-primary btn-sm">Read More</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }
